<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Debate System</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <img src="../assets/logo2.jpg" alt="College Logo" class="college-logo" onerror="this.src='https://images.pexels.com/photos/267885/pexels-photo-267885.jpeg?auto=compress&cs=tinysrgb&w=100'">
            </div>
            <div class="title-section">
                <h1>Debate Results</h1>
                <p class="subtitle">View rankings and outcomes</p>
            </div>
        </div>
        <nav class="main-nav">
            <a href="../index.html" class="nav-link">Dashboard</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="help.html" class="nav-link">Help</a>
        </nav>
    </header>

    <main class="container">
        <div class="glass-container">
            <h2 style="margin-bottom: 1.5rem;">Top Performers</h2>
            <div id="topPerformers" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem;">
            </div>
        </div>

        <div class="glass-container">
            <h2 style="margin-bottom: 1.5rem;">Winning Side Analysis</h2>
            <div id="winningSide" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
            </div>
        </div>

        <div class="table-container glass-container">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                <h2 style="margin-bottom: 0;">Complete Rankings</h2>
                <div style="display: flex; gap: 0.6rem; flex-wrap: wrap;">
                    <button type="button" class="btn btn-primary" onclick="generateAllCertificatesZip()">Generate All Certificates</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Name</th>
                        <th>College</th>
                        <th>Topic</th>
                        <th>Side</th>
                        <th>Total Score</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="resultsTable">
                </tbody>
            </table>
        </div>
    </main>

    <div id="certificateModal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 1100px; margin: 2% auto; padding: 2rem;">
            <div style="text-align: right; margin-bottom: 1rem;">
                <button onclick="closeCertificateModal()" class="btn btn-secondary">Close</button>
                <button onclick="emailCurrentCertificate()" class="btn btn-primary">Email Certificate</button>
                <button onclick="downloadCertificate()" class="btn btn-primary">Download PDF</button>
            </div>

            <div class="glass-container" style="margin-bottom: 1rem; padding: 1rem;">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; align-items: end;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label for="certificateTemplateMode">Certificate Template</label>
                        <select id="certificateTemplateMode">
                            <option value="default">Use Default Template</option>
                            <option value="uploaded">Use Uploaded Template</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 0;" id="uploadTemplateGroup">
                        <label for="certificateTemplateUpload">Upload Template Image</label>
                        <input type="file" id="certificateTemplateUpload" accept="image/*">
                    </div>

                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <button type="button" class="btn btn-secondary" onclick="clearUploadedTemplate()">Clear Uploaded Template</button>
                    </div>
                </div>
                <p id="templateStatusText" style="margin-top: 0.75rem; font-size: 0.9rem; color: var(--text-secondary);"></p>
            </div>

            <div id="certificatePreview">
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Developed by <strong>Prathap Naik</strong></p>
    </footer>

    <style>
        .certificate-template {
            width: 800px;
            height: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 20px solid #2c3e50;
            border-radius: 10px;
            padding: 2.2rem;
            position: relative;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }

        .certificate-inner {
            width: 100%;
            height: 100%;
            background: white;
            border: 3px solid #f39c12;
            border-radius: 8px;
            padding: 1.4rem 1.6rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            overflow: hidden;
            gap: 0.8rem;
        }

        .certificate-body {
            width: 100%;
            max-width: 660px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.35rem;
            flex: 1;
            min-height: 0;
        }

        .certificate-body p {
            margin: 0;
        }

        .certificate-title {
            font-size: 2.05rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.15;
        }

        .certificate-subtitle {
            font-size: 1rem;
            color: #7f8c8d;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .certificate-name {
            font-size: 1.7rem;
            font-weight: bold;
            color: #2563eb;
            margin: 0.5rem 0 0.35rem;
            border-bottom: 2px solid #2563eb;
            padding: 0 0.5rem 0.35rem;
            line-height: 1.15;
            max-width: 100%;
            overflow-wrap: anywhere;
        }

        .certificate-details {
            font-size: 1rem;
            color: #34495e;
            line-height: 1.42;
            width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .certificate-footer {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 0.75rem;
            border-top: 2px solid #ecf0f1;
            align-items: flex-end;
            gap: 1rem;
        }

        .signature-section {
            text-align: center;
            flex: 1;
        }

        .signature-line {
            width: 170px;
            border-top: 2px solid #2c3e50;
            margin: 0 auto 0.5rem;
        }

        .certificate-credit {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #475569;
            text-align: center;
            line-height: 1.25;
            width: 100%;
        }

        .uploaded-certificate {
            width: 800px;
            height: 600px;
            margin: 0 auto;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            background: #f3f4f6;
        }

        .uploaded-certificate-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .uploaded-certificate-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.28);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .uploaded-certificate-overlay h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .uploaded-certificate-overlay p {
            font-size: 1.1rem;
            margin: 0.35rem 0;
            line-height: 1.5;
        }
    </style>

    <script src="../js/script.js"></script>
    <script src="../js/results.js"></script>
</body>
</html>
