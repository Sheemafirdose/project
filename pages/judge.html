<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Login - Debate System</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <img src="../assets/logo2.jpg" alt="College Logo" class="college-logo" onerror="this.src='https://images.pexels.com/photos/267885/pexels-photo-267885.jpeg?auto=compress&cs=tinysrgb&w=100'">
            </div>
            <div class="title-section">
                <h1>Judge Portal</h1>
                <p class="subtitle">Login to access scoring and management features</p>
            </div>
        </div>
        <nav class="main-nav">
            <a href="../index.html" class="nav-link">Dashboard</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="help.html" class="nav-link">Help</a>
        </nav>
    </header>

    <main class="container">
        <div id="loginSection" class="glass-container" style="max-width: 500px; margin: 0 auto;">
            <h2 style="margin-bottom: 1.5rem;">Judge Login</h2>

            <div id="accessNotice" class="alert alert-warning" style="display: none;"></div>

            <form id="judgeLoginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Login</button>
                    <a href="../index.html" class="btn btn-back">Back to Dashboard</a>
                </div>
            </form>
        </div>

        <div id="scoringSection" class="glass-container" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>Score Participants</h2>
                <button onclick="logoutJudge()" class="btn btn-secondary">Logout</button>
            </div>

            <div id="participantsList"></div>
        </div>
    </main>

    <footer class="footer">
        <p>Developed by <strong>Prathap Naik</strong></p>
    </footer>

    <script src="../js/script.js"></script>
    <script src="../js/judge.js"></script>
</body>
</html>
