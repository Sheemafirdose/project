<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Slots - Debate System</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-section">
                <img src="../assets/logo2.jpg" alt="College Logo" class="college-logo" onerror="this.src='https://images.pexels.com/photos/267885/pexels-photo-267885.jpeg?auto=compress&cs=tinysrgb&w=100'">
            </div>
            <div class="title-section">
                <h1>Schedule Slots</h1>
                <p class="subtitle">Assign date, time, and venue for debates</p>
            </div>
        </div>
        <nav class="main-nav">
            <a href="../index.html" class="nav-link">Dashboard</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="help.html" class="nav-link">Help</a>
        </nav>
    </header>

    <main class="container">
        <div style="margin-bottom: 2rem;">
              <a href="../index.html" class="btn btn-back">&lt;- Back to Dashboard</a>
        </div>

        <div class="table-container glass-container">
            <h2 style="margin-bottom: 1.5rem;">Participant Schedule</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Topic</th>
                        <th>Side</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Venue</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="scheduleTable">
                </tbody>
            </table>
        </div>

        <div id="scheduleModal" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 500px; padding: 1.75rem;">
                <h2 style="margin-bottom: 1.5rem;">Schedule Debate Slot</h2>

                <form id="scheduleForm">
                    <input type="hidden" id="participantId">

                    <div class="form-group">
                        <label for="debateDate">Date *</label>
                        <input type="date" id="debateDate" required>
                    </div>

                    <div class="form-group">
                        <label for="debateTime">Time *</label>
                        <input type="time" id="debateTime" required>
                    </div>

                    <div class="form-group">
                        <label for="venue">Venue *</label>
                        <input type="text" id="venue" placeholder="e.g., Auditorium A" required>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                        <button type="submit" id="saveScheduleBtn" class="btn btn-primary" style="flex: 1;">Save Schedule</button>
                        <button type="button" id="sendEmailBtn" onclick="sendScheduleEmail()" class="btn btn-success" style="flex: 1; display: none;">📧 Email Slot</button>
                        <button type="button" onclick="closeScheduleModal()" class="btn btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Developed by <strong>Prathap</strong></p>
    </footer>

    <script src="../js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="../js/emailService.js"></script>
    <script src="../js/schedule.js"></script>
</body>
</html>
